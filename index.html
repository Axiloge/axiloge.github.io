<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/favicon.ico">
    <title>Axiloge</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #f0f6fc;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            padding: 0 24px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        hr {
            border: none;
            height: 1px;
            background-color: #30363d;
            margin: 30px 0;
        }

        p {
            color: #c9d1d9;
            font-size: 1rem;
        }

        .notice {
            margin-top: 20px;
            color: #58a6ff;
        }

        footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Axiloge</h1>

        <div class="subtitle">
            Software Development • Artificial Intelligence • Operating Systems
        </div>

        <hr>

        <p>
            Axiloge is a small software organization focused on the research,
            design, and development of computing technologies.
        </p>

        <p class="notice">
            Our projects will be available soon.
        </p>

        <footer>
            © 2026 Axiloge. All rights reserved.
        </footer>
    </div>

</body>
</html>
